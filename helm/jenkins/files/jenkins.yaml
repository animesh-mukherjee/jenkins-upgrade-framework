# Jenkins Configuration as Code (JCasC)
# Loaded automatically by the configuration-as-code plugin.
# Environment variables JENKINS_ADMIN_USER and JENKINS_ADMIN_PASSWORD are
# injected by the Helm chart from the jenkins Secret.
jenkins:
  systemMessage: "Managed by jenkins-upgrade-framework"
  numExecutors: 2
  mode: NORMAL

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: "http://localhost:8080/"
