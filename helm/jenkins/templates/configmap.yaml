apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jenkins.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins.labels" . | nindent 4 }}
data:
  # JCasC configuration — mounted into the controller at cascConfigMount
  jenkins.yaml: |
    {{- .Files.Get "files/jenkins.yaml" | nindent 4 }}
  # Plugin list — read by the init container to pre-install plugins into JENKINS_HOME
  plugins.txt: |
    {{- .Files.Get "files/plugins.txt" | nindent 4 }}
