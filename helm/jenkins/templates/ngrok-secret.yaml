{{- if and .Values.ngrok.enabled (not .Values.ngrok.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jenkins.fullname" . }}-ngrok
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins.labels" . | nindent 4 }}
type: Opaque
data:
  ngrok-auth-token: {{ required "ngrok.authToken is required when ngrok.enabled=true and ngrok.existingSecret is not set" .Values.ngrok.authToken | b64enc | quote }}
{{- end }}
